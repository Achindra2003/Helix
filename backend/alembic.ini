# Alembic configuration.
#
# The database URL is deliberately NOT set here: env.py reads it from
# api.config.settings, so migrations and the app can never disagree about which
# database they are pointed at. Setting it in two places is how a migration
# ends up run against the wrong one.
#
#   alembic upgrade head            # apply migrations (hosted instance)
#   alembic revision --autogenerate -m "..."   # after changing a model
#
# Self-hosters never run this: they keep boot-time create_all (see api/db.py).

[alembic]
script_location = migrations

# Timestamped, slugged filenames sort chronologically in the versions/
# directory, which the bare revision hash does not.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
