  @keyframes hx-grain{0%,100%{transform:translate(0,0);}20%{transform:translate(-3%,2%);}40%{transform:translate(2%,-2%);}60%{transform:translate(-2%,1%);}80%{transform:translate(1%,3%);}}
  @keyframes hx-spin{to{transform:rotate(360deg);}}
  @keyframes hx-spin-rev{to{transform:rotate(-360deg);}}

  .tex-warm{position:fixed;inset:0;pointer-events:none;z-index:59;background:radial-gradient(60% 50% at 18% 8%, rgba(150,110,40,0.06), transparent 60%),radial-gradient(50% 40% at 88% 90%, rgba(140,43,30,0.05), transparent 60%);}

  .chip{font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--rule-soft);border-radius:5px;padding:2px 7px;display:inline-flex;gap:5px;align-items:center;}
  .btn{border:1px solid var(--rule);background:var(--paper-3);color:var(--ink);border-radius:8px;padding:8px 13px;font-size:13px;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:var(--paper-4);}

  .row-hover:hover{background:var(--paper-3);}
  a{color:var(--oxblood);}
</style>

<body>
<div class="tex-grain"><svg width="100%" height="100%"><filter id="hxGrain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#hxGrain)"/></svg></div>

<div id="app" style="position:relative;z-index:1;height:100%;"></div>

<script>
/* =========================================================================
   Helix demo frontend — vanilla JS, wired to the live FastAPI backend.
   Backend must run on :8000; serve THIS file on :5173 (CORS allows that origin).
   ========================================================================= */
const CONFIG = {
  API: 'http://127.0.0.1:8000',
  WS: 'w1',           // workspace_id (backend default tenant)
  ME: 'u1',           // author_id for "you"
  ME_NAME: 'Maren',
};

/* ---- small helpers ---- */
const $ = sel => document.querySelector(sel);
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; };
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initialOf = n => (n || '?').trim().charAt(0).toUpperCase();
const nowTime = () => { const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };

async function api(path, opts={}){
  const res = await fetch(CONFIG.API + path, {
    headers:{'Content-Type':'application/json'}, ...opts,
  });
  if(!res.ok){ let e; try{ e=await res.json(); }catch{ e={}; } throw new Error(e?.error?.message || ('HTTP '+res.status)); }
  return res.json();
}

/* SSE over POST: backend streams `data: {json}\n\n` frames, ending with `data: [DONE]`. */
async function streamSSE(path, body, onEvent, signal){
  const res = await fetch(CONFIG.API + path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body), signal,
  });
  if(!res.ok){ let e; try{ e=await res.json(); }catch{ e={}; } throw new Error(e?.error?.message || ('HTTP '+res.status)); }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while(true){
    const {value, done} = await reader.read();
    if(done) break;
    buf += dec.decode(value, {stream:true});
    let i;
    while((i = buf.indexOf('\n\n')) >= 0){
      const frame = buf.slice(0,i); buf = buf.slice(i+2);
      const line = frame.split('\n').find(l => l.startsWith('data: '));
      if(!line) continue;
      const data = line.slice(6);
      if(data === '[DONE]'){ onEvent({kind:'done'}); continue; }
      try{ onEvent(JSON.parse(data)); }catch(_){}
    }
  }
}

/* =========================== app state =========================== */
const state = {
  screen: 'auth',          // auth | app
  view: 'chat',            // chat | library | members
  role: 'owner',           // owner | collaborator | observer
  conversations: [],       // {id, branchId, title, visibility, branches:[{id,name,parentId,depth,deep}], activeBranch}
  activeConvId: null,
  prompts: [],
  library: { search: '' },
  run: null,               // deep-reasoning run state
  busy: false,             // chat streaming in flight
};

const canAct = () => state.role === 'owner' || state.role === 'collaborator';
const activeConv = () => state.conversations.find(c => c.id === state.activeConvId) || null;
const activeBranchId = () => { const c = activeConv(); return c ? c.activeBranch : null; };
const activeBranch = () => { const c = activeConv(); return c ? c.branches.find(b => b.id === c.activeBranch) : null; };

/* =========================== ICON helpers =========================== */
const logoSvg = (size=34) => `
  <svg viewBox="0 0 44 44" style="width:${size}px;height:${size}px;">
    <circle cx="22" cy="22" r="18" fill="none" stroke="var(--gilt)" stroke-width="1.4" stroke-dasharray="92 16" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="12.5" fill="none" stroke="var(--oxblood)" stroke-width="1" opacity="0.7"/>
    <circle cx="6.5" cy="22" r="2.1" fill="var(--gilt-2)"/>
  </svg>`;

/* =========================== AUTH SCREEN =========================== */
function renderAuth(){
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el(`
  <div style="height:100%;display:flex;align-items:stretch;background:radial-gradient(130% 110% at 50% 0%, #ECE2C8 0%, #DED2B4 50%, #CDBC95 100%);">
    <div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--rule);overflow:hidden;">
      <svg viewBox="0 0 700 700" style="width:760px;height:760px;color:var(--ink);opacity:.9;">
        <g fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.30">
          <circle cx="350" cy="350" r="300" style="stroke-dasharray:1885;stroke-dashoffset:1885;animation:hx-draw 3s ease forwards .1s;"/>
          <circle cx="350" cy="350" r="232" stroke-dasharray="3 9"/>
          <circle cx="350" cy="350" r="168" style="stroke-dasharray:1056;stroke-dashoffset:1056;animation:hx-draw 3s ease forwards .5s;"/>
          <polygon points="350,70 593,490 107,490" style="stroke-dasharray:1460;stroke-dashoffset:1460;animation:hx-draw 3.4s ease forwards .3s;"/>
          <polygon points="350,630 107,210 593,210" style="stroke-dasharray:1460;stroke-dashoffset:1460;animation:hx-draw 3.4s ease forwards .6s;"/>
          <line x1="50" y1="350" x2="650" y2="350"/>
          <line x1="350" y1="50" x2="350" y2="650"/>
        </g>
      </svg>
      <div style="position:absolute;bottom:34px;left:0;right:0;text-align:center;color:var(--ink-3);font-style:italic;font-size:14px;">"As above, so below — one shared context, many branching minds."</div>
    </div>
    <div style="width:480px;display:flex;align-items:center;justify-content:center;padding:0 56px;">
      <div style="width:100%;display:flex;flex-direction:column;gap:22px;animation:hx-rise .8s ease both;">
        <div style="display:flex;align-items:center;gap:14px;">
          ${logoSvg(52)}
          <div>
            <div style="font-family:'Cinzel Decorative',serif;font-weight:700;font-size:40px;letter-spacing:.04em;color:var(--oxblood);line-height:1;">Helix</div>
            <div style="font-style:italic;font-size:14px;color:var(--ink-3);margin-top:4px;">A collaborative workspace for the recursive mind</div>
          </div>
        </div>
        <div style="display:flex;gap:4px;background:var(--paper-3);border:1px solid var(--rule-soft);border-radius:10px;padding:4px;">
          <button id="tab-in" style="flex:1;border:none;border-radius:7px;padding:9px;font-size:14px;background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);">Sign in</button>
          <button id="tab-up" style="flex:1;border:none;border-radius:7px;padding:9px;font-size:14px;background:transparent;color:var(--ink-3);">Create account</button>
        </div>
        <label style="display:flex;flex-direction:column;gap:6px;">
          <span class="eyebrow">Email</span>
          <input class="mono" value="maren@cipherlabs.io" style="background:var(--paper);border:1px solid var(--rule);border-radius:9px;padding:12px 14px;color:var(--ink);font-size:14px;outline:none;">
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;">
          <span class="eyebrow">Password</span>
          <input class="mono" type="password" value="alchemist" style="background:var(--paper);border:1px solid var(--rule);border-radius:9px;padding:12px 14px;color:var(--ink);font-size:14px;outline:none;">
        </label>
        <button id="enter" class="btn-gilt" style="border-radius:9px;padding:13px;font-size:15px;justify-content:center;">Enter workspace ⟶</button>
        <div id="auth-status" class="mono" style="font-size:11.5px;color:var(--ink-faint);display:flex;gap:12px;align-items:center;justify-content:center;">
          <span>☉ groq</span><span>·</span><span>☽ ollama</span><span>·</span><span id="health">checking…</span>
        </div>
      </div>
    </div>
  </div>`));
  $('#enter').onclick = enterApp;
  // live health check so the presenter knows the backend is reachable
  api('/health').then(h => { $('#health').textContent = 'api ✓ ('+h.provider+')'; $('#health').style.color='var(--verde)'; })
                .catch(() => { $('#health').textContent = 'api offline — start backend :8000'; $('#health').style.color='var(--oxblood)'; });
}

async function enterApp(){
  state.screen = 'app';
  renderApp();
  try { await bootstrap(); } catch(e){ console.error(e); }
}

/* =========================== BOOTSTRAP (seed data) =========================== */
async function bootstrap(){
  // 1) Seed the prompt library if empty (cheap, no LLM calls).
  let lib = await api(`/workspaces/${CONFIG.WS}/prompts`).catch(()=>({prompts:[]}));
  if(!lib.prompts || lib.prompts.length === 0){
    const seed = [
      {title:'Socratic critique', body:'Interrogate the argument above. Surface its weakest assumption, then steelman the opposite view in three sentences.', tags:['review','reasoning']},
      {title:'Extract action items', body:'From the thread above, list every commitment as: owner — action — due signal. Omit discussion.', tags:['summarize','team']},
      {title:'Adversarial red-team', body:'You are a hostile reviewer. Find the three ways this design fails under load, bad input, or a malicious tenant.', tags:['security','reasoning']},
      {title:'Tighten prose', body:'Rewrite the passage above 30% shorter with no loss of meaning. Prefer plain verbs.', tags:['writing']},
      {title:'Explain like a senior', body:'Explain the concept to a strong engineer new to the domain. One analogy, then the precise mechanism.', tags:['teaching']},
    ];
    for(const p of seed){ await api(`/workspaces/${CONFIG.WS}/prompts`, {method:'POST', body:JSON.stringify({author_id:CONFIG.ME, ...p})}).catch(()=>{}); }
    lib = await api(`/workspaces/${CONFIG.WS}/prompts`).catch(()=>({prompts:[]}));
  }
  state.prompts = lib.prompts || [];

  // 2) Start with one fresh conversation so the stage isn't empty.
  if(state.conversations.length === 0){
    await newConversation('Retrieval chunking strategy', false);
  }
  renderApp();
}

async function newConversation(title='Untitled', focus=true){
  const r = await api('/conversations', {method:'POST', body:JSON.stringify({
    workspace_id:CONFIG.WS, author_id:CONFIG.ME, title, visibility:'shared',
  })});
  const conv = {
    id:r.conversation_id, branchId:r.branch_id, title, visibility:'shared',
    branches:[{id:r.branch_id, name:'main', parentId:null, depth:0, deep:false}],
    activeBranch:r.branch_id, messages:[], headNodeId:null, hasRun:false,
  };
  state.conversations.unshift(conv);
  state.activeConvId = conv.id;
  if(focus){ state.view='chat'; renderApp(); }
  return conv;
}

/* =========================== APP SHELL =========================== */
function renderApp(){
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el(`
  <div style="height:100%;display:grid;grid-template-columns:68px 1fr;">
    <!-- RAIL -->
    <div style="background:var(--paper-3);border-right:1px solid var(--rule-soft);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;">
      <div id="rail-logo" title="Helix — sign out" style="margin-bottom:12px;">${logoSvg(34)}</div>
      <button class="rail-nav" data-view="chat"    title="Conversations" style="${railStyle('chat')}"><span style="font-size:18px;">⌇</span><span class="mono" style="font-size:8px;">CHAT</span></button>
      <button class="rail-nav" data-view="library" title="Prompt library" style="${railStyle('library')}"><span style="font-size:18px;">▦</span><span class="mono" style="font-size:8px;">LIBR</span></button>
      <button class="rail-nav" data-view="members" title="Members & roles" style="${railStyle('members')}"><span style="font-size:18px;">♔</span><span class="mono" style="font-size:8px;">TEAM</span></button>
      <div style="flex:1;"></div>
      <div title="${esc(CONFIG.ME_NAME)}" style="width:36px;height:36px;border-radius:50%;background:var(--gilt);color:#1A1404;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid var(--gilt-2);font-family:'Cinzel',serif;">${initialOf(CONFIG.ME_NAME)}</div>
    </div>
    <!-- MAIN -->
    <div style="display:flex;flex-direction:column;min-width:0;${state.role==='observer'?'opacity:.92;':''}">
      ${topBarHtml()}
      <div id="view-body" style="flex:1;min-height:0;display:flex;flex-direction:column;"></div>
    </div>
  </div>`));

  $('#rail-logo').onclick = () => { state.screen='auth'; renderAuth(); };
  document.querySelectorAll('.rail-nav').forEach(b => b.onclick = () => { state.view = b.dataset.view; renderApp(); });
  bindTopBar();

  if(state.view === 'chat') renderChat();
  else if(state.view === 'library') renderLibrary();
  else if(state.view === 'members') renderMembers();
}

function railStyle(view){
  const on = state.view === view;
  return `display:flex;flex-direction:column;align-items:center;gap:3px;width:48px;padding:8px 0;border-radius:9px;border:1px solid ${on?'var(--rule)':'transparent'};
    background:${on?'var(--paper)':'transparent'};color:${on?'var(--oxblood)':'var(--ink-3)'};`;
}

function topBarHtml(){
  const roleMap = {owner:{s:'♔',l:'Owner'}, collaborator:{s:'⌇',l:'Collaborator'}, observer:{s:'◉',l:'Observer'}};
  const r = roleMap[state.role];
  const viewLabel = state.view==='chat'?'conversations':(state.view==='library'?'prompt library':'members & roles');
  return `
  <div style="height:58px;flex:0 0 58px;background:var(--paper-3);border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 20px;gap:18px;">
    <div style="display:flex;align-items:center;gap:11px;">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--gilt-2),var(--gilt));display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:600;color:#1A1404;">C</div>
      <div style="display:flex;flex-direction:column;line-height:1.15;">
        <span style="font-size:14px;font-weight:600;font-family:'Cinzel',serif;">Cipher Labs</span>
        <span class="mono" style="font-size:11px;color:var(--ink-3);">${viewLabel}</span>
      </div>
    </div>
    <div style="flex:1;"></div>
    <div style="display:flex;align-items:center;gap:-4px;">
      ${['M','A','S','L'].map((i,k)=>`<div title="online" style="width:26px;height:26px;border-radius:50%;background:${['#9A7A2C','#46624C','#6E5AA8','#9A6B4B'][k]};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--paper-3);margin-left:-6px;">${i}</div>`).join('')}
      <span class="mono" style="font-size:11px;color:var(--ink-3);margin-left:12px;">4 online</span>
    </div>
    <div style="height:24px;width:1px;background:var(--rule-soft);"></div>
    <div style="display:flex;align-items:center;gap:9px;">
      <div class="chip" style="border-color:var(--rule);color:var(--oxblood);"><span>${r.s}</span><span style="font-weight:600;">${r.l}</span></div>
      <div style="display:flex;background:var(--paper);border:1px solid var(--rule-soft);border-radius:8px;overflow:hidden;" title="Preview as each role">
        <button class="role-sw" data-role="owner" style="${roleSw('owner')}">♔</button>
        <button class="role-sw" data-role="collaborator" style="${roleSw('collaborator')}">⌇</button>
        <button class="role-sw" data-role="observer" style="${roleSw('observer')}">◉</button>
      </div>
    </div>
  </div>`;
}
function roleSw(role){ const on=state.role===role; return `border:none;padding:6px 10px;font-size:13px;background:${on?'var(--paper-3)':'transparent'};color:${on?'var(--oxblood)':'var(--ink-3)'};`; }
function bindTopBar(){ document.querySelectorAll('.role-sw').forEach(b => b.onclick = () => { state.role=b.dataset.role; renderApp(); }); }

/* =========================== CHAT VIEW =========================== */
function renderChat(){
  const body = $('#view-body');
  body.innerHTML = '';
  body.appendChild(el(`
  <div style="flex:1;min-height:0;display:grid;grid-template-columns:248px 1fr 360px;">
    <div id="left-pane" class="pane" style="border-right:1px solid var(--rule-soft);"></div>
    <div id="stage" style="background:var(--paper-2);display:flex;flex-direction:column;min-width:0;position:relative;"></div>
    <div id="monitor" class="pane" style="border-left:1px solid var(--rule-soft);"></div>
  </div>`));
  renderLeftPane();
  renderStage();
  renderMonitor();
}

function renderLeftPane(){
  const p = $('#left-pane');
  if(!p) return;
  const conv = activeConv();
  p.innerHTML = '';
  p.appendChild(el(`
  <div style="padding:15px 16px 11px;display:flex;align-items:center;justify-content:space-between;">
    <span class="eyebrow">Conversations</span>
    ${canAct()?`<button id="new-conv" title="New conversation" style="background:none;border:none;color:var(--oxblood);font-size:20px;line-height:1;">+</button>`:''}
  </div>
  <div style="overflow-y:auto;flex:1;padding:0 9px 12px;">
    <div id="conv-list"></div>
    <div style="margin:16px 7px 8px;height:1px;background:var(--rule-soft);"></div>
    <div style="padding:4px 7px 10px;display:flex;align-items:center;gap:7px;">
      <span style="color:var(--oxblood);font-size:14px;">⌇</span><span class="eyebrow">Branch lineage</span>
    </div>
    <div id="branch-list"></div>
  </div>
  <div class="mono" style="padding:11px 16px;border-top:1px solid var(--rule-soft);font-size:10.5px;color:var(--ink-faint);display:flex;align-items:center;gap:7px;">
    <span style="width:6px;height:6px;border-radius:50%;background:var(--verde);"></span> live · server-ordered log
  </div>`));

  const list = p.querySelector('#conv-list');
  state.conversations.forEach(c => {
    const on = c.id === state.activeConvId;
    const row = el(`
      <div class="row-hover" style="display:flex;gap:9px;padding:9px 8px;border-radius:8px;cursor:pointer;${on?'background:var(--paper-3);':''}">
        <span style="font-size:13px;color:${c.visibility==='private'?'var(--ink-3)':'var(--oxblood)'};margin-top:1px;">${c.visibility==='private'?'◍':'⊙'}</span>

async function loadBranch(branchId){
  const conv = activeConv();
  try{
    const r = await api(`/conversations/branches/${branchId}/history`);
    conv.messages = r.nodes.map(nodeToMsg);
    conv.headNodeId = r.nodes.length ? r.nodes[r.nodes.length-1].id : null;
  }catch(e){ console.error(e); }
  renderChat();
}

}

/* ---- send a chat turn (live SSE) ---- */
async function sendMessage(){
  if(state.busy) return;
  const conv = activeConv();
  const ta = $('#composer');
  const text = (ta?.value || '').trim();
  if(!text || !conv) return;
  ta.value = '';
  state.busy = true;

  // optimistic user bubble
  const um = {id:'tmp-u', role:'user', name:CONFIG.ME_NAME, initial:initialOf(CONFIG.ME_NAME), body:text, time:nowTime(), tokens:''};
  conv.messages.push(um);
  const canvas = $('#canvas');
  // clear empty-state if present
  if(conv.messages.length===1) canvas.innerHTML='';
  canvas.appendChild(messageEl(um));

  // streaming assistant bubble
  const am = {id:'tmp-a', role:'assistant', name:'Helix', initial:'⟳', body:'', time:nowTime(), tokens:'', typing:true};
  const amNode = messageEl(am);
  canvas.appendChild(amNode);
  const bodyEl = amNode.querySelector('.msg-body');
  canvas.scrollTop = canvas.scrollHeight;

  let acc = '';
  try{
    await streamSSE(`/conversations/${conv.activeBranch}/messages`, {prompt:text, author_id:CONFIG.ME}, ev => {
      if(ev.kind==='user_node'){ um.id = ev.node.id; }
      else if(ev.kind==='token'){ acc += ev.text; bodyEl.textContent = acc; canvas.scrollTop = canvas.scrollHeight; }
      else if(ev.kind==='assistant_node'){ am.id = ev.node.id; conv.headNodeId = ev.node.id; if(ev.node.token_count){ am.tokens = ev.node.token_count+' tokens · ☉ groq'; } }
      else if(ev.kind==='complete' && ev.status==='error'){ acc += '\n['+ev.stop_reason+']'; bodyEl.textContent = acc; }
    });
  }catch(e){ bodyEl.textContent = acc + '\n[stream error: '+e.message+']'; }

  am.body = acc; am.typing = false;
  // finalize bubble (remove cursor, add token meta)
  amNode.replaceWith(messageEl(am));
  state.busy = false;
  renderLeftPane();
}

/* ---- fork the active branch at its head node ---- */
async function forkBranch(){
  const conv = activeConv();
  if(!conv) return;
  if(!conv.headNodeId){ alert('Send at least one message before forking — a fork needs a node to branch from.'); return; }
  const name = (prompt('Name the new branch:', 'experiment') || '').trim() || 'experiment';
  try{
    const r = await api(`/conversations/${conv.id}/fork`, {method:'POST', body:JSON.stringify({from_node_id:conv.headNodeId, name})});
    const parent = conv.branches.find(b=>b.id===conv.activeBranch);
    conv.branches.push({id:r.branch_id, name:r.name, parentId:conv.activeBranch, depth:(parent?parent.depth+1:1), deep:false});
    conv.activeBranch = r.branch_id;
    await loadBranch(r.branch_id);  // inherits the ancestor spine
  }catch(e){ alert('Fork failed: '+e.message); }
}

/* ---- escalate the composer question to Deep Reasoning (live SSE) ---- */
async function escalateDeep(){
  const conv = activeConv();
  const ta = $('#composer');
  const text = (ta?.value || '').trim() || 'What is the most defensible architecture choice here, and why?';
  if(!conv) return;
  ta && (ta.value='');

  const ctrl = new AbortController();
  state.run = { status:'live', depth:0, energy:0, budgetPct:0, steps:[], answer:'', stopReason:'', abort:ctrl, question:text };
  conv.hasRun = true;
  renderLeftPane();
  renderMonitor();

  const pickText = (p) => {
    if(!p) return '';
    for(const k of ['thought','synthesis','surfaced_insight','insight','reflection','seed']){
      if(typeof p[k]==='string' && p[k].trim()) return p[k];
    }
    const v = Object.values(p).find(x => typeof x==='string' && x.length>4);
    return v || '';
  };

  let answerAcc = '';
  try{
    await streamSSE(`/conversations/${conv.activeBranch}/deep`, {prompt:text, author_id:CONFIG.ME}, ev => {
      const run = state.run; if(!run) return;
      if(ev.kind==='step'){
        run.depth = ev.depth ?? run.depth;
        run.energy = ev.energy ?? run.energy;
        run.steps.push({kind:ev.node, meta:'step '+ev.idx+' · depth '+ev.depth, text: pickText(ev.payload)});
        renderMonitor();
      } else if(ev.kind==='budget'){
        run.budgetPct = Math.round((ev.pct<=1 ? ev.pct*100 : ev.pct));
        renderMonitor();
      } else if(ev.kind==='token'){
        answerAcc += ev.text; run.answer = answerAcc.replace(/^\s*\[answer\]\s*/i,''); renderMonitor();
      } else if(ev.kind==='waiting'){
        run.steps.push({kind:'steer', meta:'awaiting human input', text:'(paused at a steer point)'});
        renderMonitor();
      } else if(ev.kind==='complete'){
        run.status = ev.status==='killed' ? 'killed' : (ev.status==='error' ? 'error' : 'done');
        run.stopReason = ev.stop_reason;
      } else if(ev.kind==='assistant_node'){
        if(ev.node && ev.node.content && !run.answer){ run.answer = ev.node.content; }
        conv.headNodeId = ev.node.id;
      }
    }, ctrl.signal);
  }catch(e){
    const run = state.run;
    if(run){
      if(e.name==='AbortError'){ run.status='killed'; run.stopReason='killed by operator'; }
      else { run.status='error'; run.stopReason=e.message; }
    }
  }
  if(state.run && state.run.status==='live'){ state.run.status='done'; state.run.stopReason = state.run.stopReason||'ended'; }
  renderMonitor();
  // refresh the stage so the persisted run answer shows in the thread too
  loadBranch(conv.activeBranch);
}

function killRun(){
  if(state.run && state.run.abort){ state.run.abort.abort(); }
}

        ${canAct()?`<button id="save-prompt" class="btn-gilt" style="border-radius:9px;padding:10px 16px;font-size:13.5px;">+ Save prompt</button>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:10px 14px;margin:22px 0 14px;">
        <span style="color:var(--oxblood);font-size:15px;">⌕</span>
        <input id="lib-search" value="${esc(state.library.search)}" placeholder="Search title, body, or tags…" style="flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:14px;font-family:'IM Fell English',serif;">
        <span class="mono" style="font-size:11px;color:var(--ink-faint);">${filtered.length} prompts</span>
      </div>
      <div id="prompt-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"></div>
    </div>
  </div>`));

  const grid = body.querySelector('#prompt-grid');
  filtered.forEach((p,i) => {
    const card = el(`
      <div style="background:var(--paper);border:1px solid var(--rule-soft);border-radius:12px;padding:17px 18px;display:flex;flex-direction:column;gap:11px;">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <span style="color:var(--gilt);font-size:16px;margin-top:1px;">${sigils[i%sigils.length]}</span>
          <div style="font-size:16px;font-weight:600;color:var(--ink);flex:1;line-height:1.2;font-family:'Cinzel',serif;">${esc(p.title)}</div>
        </div>
        <div style="font-size:13.5px;line-height:1.55;color:var(--ink-2);font-style:italic;">"${esc(p.body)}"</div>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
          ${(p.tags||[]).map(t=>`<span class="mono" style="font-size:11px;color:var(--ink-3);border:1px solid var(--rule-soft);border-radius:5px;padding:2px 8px;">${esc(t)}</span>`).join('')}
          <div style="flex:1;"></div>
          ${canAct()?`<button class="insert-btn btn" data-id="${esc(p.id)}" style="padding:4px 10px;font-size:12px;color:var(--oxblood);">Insert →</button>`:''}
        </div>
      </div>`);
    grid.appendChild(card);
  });

  const search = body.querySelector('#lib-search');
  search.oninput = () => { state.library.search = search.value; const grid2=$('#prompt-grid'); const sc=search.selectionStart; renderLibrary(); const s2=$('#lib-search'); s2.focus(); s2.setSelectionRange(sc,sc); };
  const sp = body.querySelector('#save-prompt');
  if(sp) sp.onclick = savePrompt;
  body.querySelectorAll('.insert-btn').forEach(b => b.onclick = () => insertPrompt(b.dataset.id));
}

async function savePrompt(){
  const title = (prompt('Prompt title:') || '').trim(); if(!title) return;
  const text = (prompt('Prompt body:') || '').trim(); if(!text) return;
  const tags = (prompt('Tags (comma-separated):','') || '').split(',').map(s=>s.trim()).filter(Boolean);
  try{
    await api(`/workspaces/${CONFIG.WS}/prompts`, {method:'POST', body:JSON.stringify({author_id:CONFIG.ME, title, body:text, tags})});
    const lib = await api(`/workspaces/${CONFIG.WS}/prompts`);
    state.prompts = lib.prompts || [];
    renderLibrary();
  }catch(e){ alert('Save failed: '+e.message); }
}

/* insert a saved prompt as a live turn into the active conversation */
async function insertPrompt(promptId){
  let conv = activeConv();
  if(!conv){ conv = await newConversation('From a saved prompt'); }
  state.view = 'chat';
  state.activeConvId = conv.id;
  renderApp();
  // run it via the from-prompt insert path (streams like a normal turn)
  const canvas = $('#canvas'); if(conv.messages.length===0 && canvas) canvas.innerHTML='';
  const am = {id:'tmp-a', role:'assistant', name:'Helix', initial:'⟳', body:'', time:nowTime(), typing:true};
  const um = {id:'tmp-u', role:'user', name:CONFIG.ME_NAME, initial:initialOf(CONFIG.ME_NAME), body:'(inserted saved prompt)', time:nowTime()};
  conv.messages.push(um, am);
  $('#canvas')?.appendChild(messageEl(um));
  const amNode = messageEl(am); $('#canvas')?.appendChild(amNode);
  const bodyEl = amNode.querySelector('.msg-body');
  let acc='';
  try{
    await streamSSE(`/conversations/${conv.activeBranch}/messages/from-prompt`, {prompt_id:promptId, author_id:CONFIG.ME}, ev => {
      if(ev.kind==='user_node'){ um.body = ev.node.content; um.id=ev.node.id; const c=$('#canvas'); /* re-render user bubble with real prompt text */ }
      else if(ev.kind==='token'){ acc+=ev.text; bodyEl.textContent=acc; const c=$('#canvas'); if(c) c.scrollTop=c.scrollHeight; }
      else if(ev.kind==='assistant_node'){ am.id=ev.node.id; conv.headNodeId=ev.node.id; }
    });
  }catch(e){ bodyEl.textContent = acc+'\n[error: '+e.message+']'; }
  am.body=acc; am.typing=false;
  loadBranch(conv.activeBranch);
}
