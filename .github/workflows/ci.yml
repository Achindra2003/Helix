# Continuous integration — runs on every push and pull request.
#
# Three independent jobs, so a failure tells you *which* lane broke:
#   backend  — the 261-test hermetic suite (no API keys, no network, no Docker)
#   frontend — the TypeScript typecheck + production bundle
#   image    — proves the Docker image still builds
#
# The `image` job exists because of a real incident: requirements.txt pinned a
# version of pydantic-settings that requirements-engine.txt could not satisfy.
# Nobody noticed, because installing the two files as separate pip commands
# lets the second silently override the pin. Only a clean single-command
# install — a Docker build — surfaces it. Now CI does that on every PR.
#
# The browser click-through (frontend/app/e2e/smoke.mjs) is deliberately NOT
# here: it drives a real agent run and a real deep run, so it needs a live
# GROQ_API_KEY. CI stays secret-free.

name: CI

on:
  push:
    branches: [main, ui-standout, v2-complete]
  pull_request:

# A new push to the same branch cancels the previous run — no point burning
# minutes on a commit that has already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (261, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-engine.txt

      # BOTH files are required. With requirements.txt alone, six test modules
      # fail at *collection* with ModuleNotFoundError: langchain_core — the
      # suite does not merely fail, it never runs.
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-engine.txt -r requirements-dev.txt

      # No secrets are set: the suite runs on the stub provider and a throwaway
      # SQLite database. If a test ever needs a real key, that test is wrong.
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      # `ci` (not `install`) installs exactly the lockfile versions and fails
      # if package.json and the lockfile disagree.
      - name: Install dependencies
        working-directory: frontend/app
        run: npm ci

      # `npm run build` is `tsc --noEmit && vite build` — typecheck then bundle.
      - name: Build
        working-directory: frontend/app
        run: npm run build

  image:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only — never pushed. This is a correctness gate, not a release.
      # GitHub Actions cache keeps the torch layer between runs so this does
      # not cost ten minutes on every PR.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
