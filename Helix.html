  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

monitored<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"{{ runStatusStyle }}\">{{ runStatusLabel }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- idle -->\n            <sc-if value=\"{{ runIdle }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:34px 30px;text-align:center;position:relative;\">\n              <div style=\"position:relative;width:130px;height:130px;opacity:.5;\">\n                <svg viewBox=\"0 0 130 130\" style=\"width:130px;height:130px;animation:hx-spin 90s linear infinite;color:var(--ash-2);\"><circle cx=\"65\" cy=\"65\" r=\"58\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"65\" cy=\"65\" r=\"42\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\" stroke-dasharray=\"2 6\"><\u002Fcircle><circle cx=\"65\" cy=\"65\" r=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"7\" cy=\"65\" r=\"3.4\" fill=\"var(--ember)\"><\u002Fcircle><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-family:'Cinzel',serif;font-weight:500;font-size:21px;color:var(--ash);letter-spacing:.04em;\">Ouroboros is resting<\u002Fdiv>\n              <div style=\"font-size:14px;color:var(--ash-2);line-height:1.6;max-width:248px;font-family:'IM Fell English',serif;\">Send a hard question here and Ouroboros works through it in a loop — <span style=\"color:var(--ash);font-style:italic;\">reason, reflect, synthesize<\u002Fspan> — and you can watch every step, steer it, or stop it at any time.<\u002Fdiv>\n              <sc-if value=\"{{ canAct }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ startRun }}\" style=\"background:transparent;border:1px solid var(--ember);color:var(--ember);padding:11px 22px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;\" styl iv>\n                    <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ash-2);margin-bottom:5px;letter-spacing:.08em;\"><span>ENERGY<\u002Fspan><span style=\"color:var(--ash);\">{{ energyPct }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:4px;background:rgba(255,255,255,0.06);overflow:hidden;\"><div style=\"height:100%;width:{{ energyPct }};background:var(--ash);transition:width .6s;\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ash-2);margin-bottom:5px;letter-spacing:.08em;\"><span>TOKENS<\u002Fspan><span style=\"color:{{ budgetColor }};\">{{ runTokens }}/{{ runBudget }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:4px;background:rgba(255,255,255,0.06);overflow:hidden;\"><div style=\"height:100%;width:{{ budgetPct }};background:{{ budgetColor }};transition:width .6s;\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ budgetAlert }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin:11px 16px 0;padding:8px 12px;background:rgba(197,117,42,0.12);border:1px solid rgba(197,117,42,0.45);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ember);display:flex;align-items:center;gap:8px;\">⚠ {{ budgetPct }} of token budget used<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- the work (trace) -->\n              <div id=\"hx-trace\" style=\"flex:1;min-height:0;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:0;\">\n                <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:13px;\">\n                    <div style=\"display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:26px;\">\n                      <div style=\"{{ s.medallion }}\">{{ s.sigil }}<\u002Fdiv>\n                      <span style=\"width:1px;flex:1;background:rgba(197,117,42,0.16);min-height:16px;\"><\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"padding-bottom:16px;min-width:0;flex:1;\">\n                      <div style=\"display:flex;align-items:center;gap:9px;\">\n                        <span style=\"font-family:'Cinzel',serif;font-weight:600;font-size:11px;letter-spacing:.14em;color:{{ s.color }};text-transform:uppercase;\">{{ s.stage }}<\u002Fspan>\n                        <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ash-2);\">{{ s.meta }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:14px;line-height:1.55;color:{{ s.textColor }};margin-top:5px;font-family:'IM Fell English',serif;\">{{ s.text }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ runFinished }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;padding:14px 8px 6px;\">\n                    <div style=\"{{ sealStyle }}\">\n                      <svg viewBox=\"0 0 90 90\" style=\"width:84px;height:84px;color:{{ sealColor }};\"><path d=\"M45 3 C57 4 69 9 74 21 C80 33 78 50 68 60 C58 70 53 71 45 71 C37 71 32 70 22 60 C12 50 10 33 16 21 C21 9 33 4 45 3 Z\" fill=\"currentColor\" stroke=\"rgba(0,0,0,0.4)\" stroke-width=\"1.5\"><\u002Fpath><circle cx=\"45\" cy=\"37\" r=\"24\" fill=\"none\" stroke=\"rgba(0,0,0,0.3)\" stroke-width=\"1\" stroke-dasharray=\"2 4\"><\u002Fcircle><ellipse cx=\"32\" cy=\"22\" rx=\"14\" ry=\"8\" fill=\"rgba(255,245,210,0.18)\"><\u002Fellipse><text x=\"45\" y=\"46\" text-anchor=\"middle\" font-size=\"26\" fill=\"rgba(0,0,0,0.55)\">{{ sealSigil }}<\u002Ftext><\u002Fsvg>\n                    <\u002Fdiv>\n                    <div style=\"text-align:center;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;color:{{ sealColor }};text-transform:uppercase;\">{{ finishTitle }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-family:'IM Fell English',serif;font-style:italic;font-size:13px;color:var(--ash-2);line-height:1.5;max-width:260px;\">{{ finishLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <!-- temper input -->\n              <sc-if value=\"{{ steerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:13px 16px;border-top:1px solid rgba(197,117,42,0.16);background:var(--char-2);\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ember);margin-bottom:8px;letter-spacing:.06em;\">Steer · paused at this step<\u002Fdiv>\n                <div style=\"display:flex;gap:9px;\">\n                  <input value=\"{{ steerText }}\" oninput=\"{{ onSteer }}\" placeholder=\"Add guidance for the next step…\" style=\"flex:1;background:var(--char);border:1px solid rgba(197,117,42,0.4);padding:9px 12px;color:var(--ash);font-size:14px;font-family:'IM Fell English',serif;outline:none;\">\n                  <button onclick=\"{{ applySteer }}\" style=\"background:var(--ember);border:none;color:var(--char);padding:0 16px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\">Resume<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- controls -->\n              <sc-if value=\"{{ runLive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:14px 16px;border-top:1px solid rgba(197,117,42,0.16);display:flex;gap:10px;\">\n                <button onclick=\"{{ steerRun }}\" style=\"flex:1;background:transparent;border:1px solid rgba(197,117,42,0.5);color:var(--ember);padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:rgba(197,117,42,0.1);\">{{ pauseLabel }}<\u002Fbutton>\n                <button onclick=\"{{ killRun }}\" style=\"flex:1;background:rgba(140,43,30,0.2);border:1px solid var(--oxblood-2);color:#E89A86;padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:rgba(140,43,30,0.32);\">Stop<\u002Fbutton>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ runFinished }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:14px 16px;border-top:1px solid rgba(197,117,42,0.16);display:flex;gap:10px;\">\n                <button onclick=\"{{ dismissRun }}\" style=\"flex:1;background:transparent;border:1px solid rgba(255,255,255,0.14);color:var(--ash-2);padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:rgba(255,255,255,0.05);\">Dismiss<\u002Fbutton>\n                <button style=\"flex:1;background:transparent;border:1px solid rgba(197,117,42,0.5);color:var(--ember);padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:rgba(197,117,42,0.1);\">⎙ Export<\u002Fbutton>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ========== GRIMOIRE ========== -->\n        <sc-if value=\"{{ isLibrary }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;min-height:0;overflow-y:auto;padding:36px 48px 56px;animation:hx-rise .5s ease both;\">\n          <div style=\"max-width:1040px;margin:0 auto;\">\n            <div style=\"display:flex;align-items:flex-end;gap:18px;border-bottom:2px solid var(--ink-2);padding-bottom:18px;\">\n              <div style=\"flex:1;\">\n                <div style=\"font-family:'Cinzel Decorative',serif;font-weight:700;font-size:12px;letter-spacing:.34em;color:var(--oxblood);text-transform:uppercase;\">Saved prompts<\u002Fdiv>\n                <div style=\"font-family:'Cinzel',serif;font-weight:700;font-size:40px;color:var(--ink);line-height:1;margin-top:6px;\">Prompts<\u002Fdiv>\n                <div style=\"font-family:'IM Fell English',serif;font-style:italic;font-size:16px;color:var(--ink-3);margin-top:10px;\">Your team's shared prompts — reusable, tagged, and ranked by how often they're used.<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ canAct }}\" hint-placeholder-val=\"{{ true }}\">\n              <button style=\"background:var(--oxblood);color:var(--paper);border:none;padding:11px 18px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:8px;\" style-hover=\"background:var(--oxblood-2);\">+ New prompt<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--ink-2);padding:11px 16px;margin:24px 0 6px;\">\n              <span style=\"color:var(--oxblood);font-size:16px;\">⌖<\u002Fspan>\n              <input value=\"{{ librarySearch }}\" oninput=\"{{ onLibrarySearch }}\" placeholder=\"Search prompts…\" style=\"flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:16px;font-family:'IM Fell English',serif;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-faint);\">{{ promptCount }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;\">\n              <sc-for list=\"{{ filteredPrompts }}\" as=\"p\" hint-placeholder-count=\"6\">\n                <div style=\"background:var(--paper);border:1px solid var(--rule);padding:0;display:flex;flex-direction:column;position:relative;\" style-hover=\"border-color:var(--ink-2);\">\n                  <div style=\"position:absolute;top:0;left:0;width:4px;height:100%;background:var(--oxblood);opacity:.5;\"><\u002Fdiv>\n                  <div style=\"padding:18px 20px 16px;display:flex;flex-direction:column;gap:12px;\">\n                    <div style=\"display:flex;align-items:flex-start;gap:12px;\">\n                      <span style=\"font-size:24px;color:var(--ink);line-height:1;margin-top:2px;\">{{ p.sigil }}<\u002Fspan>\n                      <div style=\"font-family:'Cinzel',serif;font-weight:600;font-size:18px;color:var(--ink);flex:1;line-height:1.15;\">{{ p.title }}<\u002Fdiv>\n                      <div style=\"text-align:right;line-height:1;\" title=\"times used\">\n                        <div style=\"font-family:'Cinzel',serif;font-weight:700;font-size:20px;color:var(--oxblood);\">{{ p.used }}<\u002Fdiv>\n                        <div style=\"font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--ink-faint);text-transform:uppercase;\">uses<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:15px;line-height:1.6;color:var(--ink-2);font-family:'IM Fell English',serif;font-style:italic;\">“{{ p.body }}”<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--rule-soft);padding-top:12px;\">\n                      <sc-for list=\"{{ p.tagList }}\" as=\"t\" hint-placeholder-count=\"2\">\n                        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3);border:1px solid var(--rule);padding:2px 9px;\">{{ t.name }}<\u002Fspan>\n                      <\u002Fsc-for>\n                      <div style=\"flex:1;\"><\u002Fdiv>\n                      <span style=\"font-family:'IM Fell English',serif;font-style:italic;font-size:13px;color:var(--ink-faint);\">by {{ p.author }}<\u002Fspan>\n                      <sc-if value=\"{{ canAct }}\" hint-placeholder-val=\"{{ true }}\">\n                      <button onclick=\"{{ p.insert }}\" style=\"background:var(--paper-2);border:1px solid var(--ink-2);color:var(--ink);padding:5px 12px;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:var(--oxblood);color:var(--paper);\">Use →<\u002Fbutton>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ========== THE CIRCLE ========== -->\n        <sc-if value=\"{{ isMembers }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;min-height:0;overflow-y:auto;padding:36px 48px 56px;animation:hx-rise .5s ease both;\">\n          <div style=\"max-width:1000px;margin:0 auto;\">\n            <div style=\"border-bottom:2px solid var(--ink-2);padding-bottom:18px;\">\n              <div style=\"font-family:'Cinzel Decorative',serif;font-weight:700;font-size:12px;letter-spacing:.34em;color:var(--oxblood);text-transform:uppercase;\">Cipher Labs<\u002Fdiv>\n              <div style=\"font-family:'Cinzel',serif;font-weight:700;font-size:40px;color:var(--ink);line-height:1;margin-top:6px;\">Members<\u002Fdiv>\n              <div style=\"font-family:'IM Fell English',serif;font-style:italic;font-size:16px;color:var(--ink-3);margin-top:10px;\">Owner, Collaborator, and Viewer. A member's role sets what they can do — and changes how the workspace looks for them.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:11px;margin:26px 0 42px;\">\n              <sc-for list=\"{{ memberRows }}\" as=\"m\" hint-placeholder-count=\"4\">\n                <div style=\"background:var(--paper);border:1px solid var(--rule);padding:15px 20px;display:flex;align-items:center;gap:18px;\" style-hover=\"border-color:var(--ink-2);\">\n                  <div style=\"position:relative;color:{{ m.color }};flex:0 0 auto;\">\n                    <svg viewBox=\"0 0 48 48\" style=\"width:46px;height:46px;\"><path d=\"M24 2 C33 3 42 8 45 17 C48 26 45 36 38 42 C32 47 28 47 24 47 C20 47 16 47 10 42 C3 36 0 26 3 17 C6 8 15 3 24 2 Z\" fill=\"currentColor\" stroke=\"rgba(0,0,0,0.35)\" stroke-width=\"1\"><\u002Fpath><ellipse cx=\"17\" cy=\"15\" rx=\"10\" ry=\"6\" fill=\"rgba(255,245,210,0.24)\"><\u002Fellipse><\u002Fsvg>\n                    <span style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:17px;color:var(--paper);\">{{ m.initial }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"min-width:0;flex:1;\">\n                    <div style=\"font-family:'Cinzel',serif;font-weight:600;font-size:17px;color:var(--ink);\">{{ m.name }}<\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-3);margin-top:2px;\">{{ m.email }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ m.statusColor }};\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ m.statusColor }};\"><\u002Fspan>{{ m.status }}<\u002Fdiv>\n                  <div style=\"{{ m.badgeStyle }}\"><span style=\"font-size:15px;\">{{ m.sigil }}<\u002Fspan><div style=\"line-height:1;\"><div style=\"font-family:'Cinzel',serif;font-weight:600;font-size:13px;\">{{ m.rank }}<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.04em;opacity:.8;\">{{ m.roleLabel }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                  <sc-if value=\"{{ canEditPerms }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:var(--ink-faint);cursor:pointer;font-size:18px;\">⋯<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n              <span style=\"font-family:'Cinzel',serif;font-weight:600;font-size:25px;color:var(--ink);\">Permissions<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--oxblood);border:1px solid var(--oxblood);padding:2px 9px;\">policy as data<\u002Fspan>\n              <div style=\"flex:1;\"><\u002Fdiv>\n              <sc-if value=\"{{ canEditPerms }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'IM Fell English',serif;font-style:italic;font-size:13px;color:var(--ink-3);\">Editable by owners — changes apply instantly<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"background:var(--paper);border:1px solid var(--ink-2);\">\n              <div style=\"display:grid;grid-template-columns:1fr 96px 116px 96px;padding:13px 20px;border-bottom:1.5px solid var(--ink-2);background:var(--paper-3);\">\n                <span style=\"font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);\">Action<\u002Fspan>\n                <span style=\"font-family:'Cinzel',serif;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--oxblood);text-align:center;\">♔ Owner<\u002Fspan>\n                <span style=\"font-family:'Cinzel',serif;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--gilt);text-align:center;\">☿ Collaborator<\u002Fspan>\n                <span style=\"font-family:'Cinzel',serif;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);text-align:center;\">☽ Viewer<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ permRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n                <div style=\"{{ r.rowStyle }}\">\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-2);\">{{ r.key }}<\u002Fspan>\n                  <span style=\"text-align:center;font-size:15px;color:{{ r.oColor }};\">{{ r.o }}<\u002Fspan>\n                  <span style=\"text-align:center;font-size:15px;color:{{ r.cColor }};\">{{ r.c }}<\u002Fspan>\n                  <span style=\"text-align:center;font-size:15px;color:{{ r.bColor }};\">{{ r.b }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'app', view: 'chat', role: 'owner',\n    activeConvId: 'c1', activeBranch: 'main',\n    composer: '', run: null, steerOpen: false, steerText: '', librarySearch: '', authTab: 'signin',\n  };\n\n  ws = { name: 'Cipher Labs' };\n  me = { name: 'Maren Vos', initial: 'M' };\n\n  members = [\n    { name: 'Maren Vos', initial: 'M', email: 'maren@cipherlabs.io', role: 'owner', status: 'present', color: '#8C2B1E' },\n    { name: 'Adiel Kun', initial: 'A', email: 'adiel@cipherlabs.io', role: 'collaborator', status: 'present', color: '#46624C' },\n    { name: 'Soren Pax', initial: 'S', email: 'soren@cipherlabs.io', role: 'collaborator', status: 'away', color: '#5B4E72' },\n    { name: 'Lia Reyes', initial: 'L', email: 'lia@cipherlabs.io', role: 'observer', status: 'present', color: '#9A7A2C' },\n  ];\n\n  conversations = [\n    { id: 'c1', title: 'Retrieval chunking strategy', visibility: 'shared', meta: '4 messages · 3 branches', hasRun: true },\n    { id: 'c2', title: 'Eval harness design', visibility: 'shared', meta: '11 messages · Adiel' },\n    { id: 'c3', title: 'Auth token rotation', visibility: 'private', meta: '6 messages · only you' },\n    { id: 'c4', title: 'Q3 research synthesis', visibility: 'shared', meta: '23 messages · 4 branches' },\n    { id: 'c5', title: 'Groq vs Ollama cost model', visibility: 'shared', meta: '9 messages · Soren' },\n  ];\n\n  branches = [\n    { id: 'main', name: 'main', depth: 0, deep: false },\n    { id: 'chunk-v2', name: 'chunk-v2', depth: 1, deep: false },\n    { id: 'chunk-reason', name: 'chunk · deep', depth: 2, deep: true },\n    { id: 'semantic-split', name: 'semantic-split', depth: 1, deep: false },\n  ];\n\n  baseMessages = [\n    { id: 'n1', who: 'Maren Vos', initial: 'M', role: 'user', color: '#8C2B1E', time: '09:14', body: \"We are getting ragged retrieval on long PDFs — answers cite the wrong paragraph. What chunk boundary policy should we adopt?\" },\n    { id: 'n2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '09:14', body: \"Three policies are viable:\\n\\n  i.   Fixed-token windows — simplest, yet it slices mid-sentence and loses heading context.\\n  ii.  Recursive structural — split on document structure (headings → paragraphs → sentences) under a token cap. Preserves meaning; more craft.\\n  iii. Semantic split — cluster by meaning. Highest quality, highest cost.\\n\\nFor mixed PDFs I would begin with recursive structural, and measure.\", tokens: '312 tokens · ☉ groq/llama-3.1-70b · 0.9s' },\n    { id: 'n3', who: 'Adiel Kun', initial: 'A', role: 'user', color: '#46624C', time: '09:21', body: \"Let us try recursive structural: 512-token cap, 64-token overlap. I will branch to test a semantic split in parallel.\" },\n    { id: 'n4', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '09:21', body: \"A sound plan. Guard two things: never break across a heading boundary — it orphans the section title — and dedupe the 64-token overlap at retrieval, lest the model count twice. Want me to run this through Ouroboros?\", tokens: '188 tokens · ☉ groq/llama-3.1-70b · 0.6s' },\n  ];\n\n  v2Messages = [\n    { id: 'n1', who: 'Maren Vos', initial: 'M', role: 'user', color: '#8C2B1E', time: '09:14', body: \"We are getting ragged retrieval on long PDFs. What chunk boundary policy should we adopt?\" },\n    { id: 'n2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '09:14', body: \"Three policies are viable: fixed-token, recursive structural, and semantic split. For mixed PDFs I would begin with recursive structural and measure.\", tokens: '312 tokens', forked: true },\n    { id: 'n5', who: 'Adiel Kun', initial: 'A', role: 'user', color: '#46624C', time: '10:02', body: \"On this branch: what if we embed each paragraph and merge adjacent ones until cosine similarity drops below 0.82? That keeps coherent units whole.\" },\n    { id: 'n6', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '10:02', body: \"That is the semantic-merge approach. Its virtue: chunks align to ideas, not token counts. Watch the threshold — too high fragments, too low over-merges. Calibrate 0.82 against a labelled set before you commit.\", tokens: '241 tokens · ☉ groq/llama-3.1-70b · 0.7s' },\n  ];\n\n  threads = {\n    c2: [\n      { id: 'g1', who: 'Adiel Kun', initial: 'A', role: 'user', color: '#46624C', time: '14:03', body: \"Designing the eval harness — what is the minimal set of metrics we must trust before accepting a retrieval change?\" },\n      { id: 'g2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '14:03', body: \"Three: context precision (did we fetch the right chunks), context recall (did we miss any), answer faithfulness (is the answer grounded in what we fetched). Hold them on a frozen labelled set, so each run is comparable to the last.\", tokens: '203 tokens · ☉ groq/llama-3.1-70b · 0.7s' },\n    ],\n    c3: [\n      { id: 'h1', who: 'Maren Vos', initial: 'M', role: 'user', color: '#8C2B1E', time: '08:40', body: \"Sealed note to self: rotate the JWT signing key. What breaks for tokens already issued?\" },\n      { id: 'h2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '08:40', body: \"Hold both keys valid through a grace window: verify against old and new, sign only with the new. When the longest token's life elapses, retire the old. No living session is forced to re-auth.\", tokens: '176 tokens · ☽ ollama/llama-3.1-8b · 1.4s' },\n    ],\n    c4: [\n      { id: 'i1', who: 'Soren Pax', initial: 'S', role: 'user', color: '#5B4E72', time: '11:20', body: \"Drawing the Q3 threads together. Can you synthesize the three competing retrieval approaches into one recommendation?\" },\n      { id: 'i2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '11:20', body: \"Recommendation: heading-aware recursive split as the default; a calibrated semantic-merge pass for dense corpora; fixed-window only where structure is absent. Prove each on the shared harness before rollout.\", tokens: '231 tokens · ☉ groq/llama-3.1-70b · 0.8s' },\n    ],\n    c5: [\n      { id: 'j1', who: 'Soren Pax', initial: 'S', role: 'user', color: '#5B4E72', time: '16:55', body: \"Cost model: at 2M tokens a day, when does local Ollama beat hosted Groq?\" },\n      { id: 'j2', who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: '16:55', body: \"Hosted wins until you saturate a GPU you already own. Below ~1.5M tokens/day, Groq's price leads on total cost. Above it, an amortised local box repays itself in ~4 months — at the price of latency variance and the burden of ops.\", tokens: '258 tokens · ☽ ollama/llama-3.1-8b · 1.6s' },\n    ],\n  };\n\n  prompts = [\n    { id: 'p1', sigil: '☿', title: 'Socratic critique', body: 'Interrogate the argument above. Name its weakest assumption, then steelman the opposite view in three sentences.', tags: ['review', 'reasoning'], used: 42, author: 'Maren' },\n    { id: 'p2', sigil: '♃', title: 'Extract action items', body: 'From the thread above, list every commitment as: owner — task — due signal. Omit all discussion.', tags: ['summary', 'team'], used: 31, author: 'Adiel' },\n    { id: 'p3', sigil: '♂', title: 'Red-team this design', body: 'You are a hostile reviewer. Find the three ways this design fails: under load, on bad input, or with a malicious tenant.', tags: ['security', 'reasoning'], used: 18, author: 'Soren' },\n    { id: 'p4', sigil: '☉', title: 'Tighten the writing', body: 'Rewrite the passage above a third shorter with no loss of meaning. Prefer plain verbs.', tags: ['writing'], used: 55, author: 'Maren' },\n    { id: 'p5', sigil: '♄', title: 'SQL from schema', body: 'Given the diagram above, write the query for the stated question. Use CTEs. Comment each join.', tags: ['data', 'code'], used: 12, author: 'Adiel' },\n    { id: 'p6', sigil: '☽', title: 'Explain like a mentor', body: 'Explain the topic to a strong engineer new to the area. One analogy, then the precise mechanism.', tags: ['teaching'], used: 27, author: 'Lia' },\n  ];\n\n  permActions = [\n    { key: 'Read & replay conversations', o: 1, c: 1, b: 1 },\n    { key: 'Send messages', o: 1, c: 1, b: 0 },\n    { key: 'Create branches', o: 1, c: 1, b: 0 },\n    { key: 'Save prompts', o: 1, c: 1, b: 0 },\n    { key: 'Run Ouroboros', o: 1, c: 1, b: 0 },\n    { key: 'Steer & stop runs', o: 1, c: 1, b: 0 },\n    { key: 'Invite & set roles', o: 1, c: 0, b: 0 },\n    { key: 'Edit permissions', o: 1, c: 0, b: 0 },\n  ];\n\n  NIGREDO = [\n    'Frame the boundary problem thus — maximise retrieval precision under a fixed token measure per chunk.',\n    'A heading bears scope. Orphan it in the split, and every child paragraph loses the word that disambiguates it.',\n    'Overlap trades recall for redundancy: 64 tokens recovers the sundered sentence, yet swells the index near a tenth.',\n    'Semantic merge is adaptive — size should follow the density of ideas, not a fixed count. Dense tables crave smaller units.',\n    'Mark the failure where two unrelated passages share a vocabulary; a naive cosine merge would wrongly wed them.',\n  ];\n  ALBEDO = [\n    'Yet precision alone deceives — a chunk too small starves the model of its surrounding evidence at the hour of answer.',\n    'The prior turn presumed flat prose. But a PDF bears tables and footnotes, whose structure confounds the heading rule.',\n    'Is 0.82 a threshold that travels? Unlikely — it must be calibrated per corpus, not carried as a constant.',\n    'Redundancy from overlap harms only if retrieval double-counts; dedupe at the read, and the cost is undone.',\n    'I circle the same axis. The change diminishes — this is now a question of measurement, no longer of reason.',\n  ];\n  RUBEDO = [\n    'Synthesis: heading-aware recursive split, 512-cap and 64-overlap, with overlap deduped at the read.',\n    'Synthesis: add a semantic-merge pass on top of the structural split, gated by a per-corpus calibrated threshold.',\n    'Synthesis: let chunk size follow local idea-density; fall back to a fixed 512 where structure is absent.',\n    'Synthesis: the last doubt is empirical — settle it by an A/B test over the labelled set, not by more reasoning.',\n    'Final answer: heading-aware recursive split, paired with a calibrated semantic merge, validated on the eval harness.',\n  ];\n\n  componentDidMount() {\n    this._mm = (e) => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        this._raf = null;\n        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;\n        const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;\n        document.querySelectorAll('[data-parallax]').forEach(el => {\n          const d = parseFloat(el.getAttribute('data-parallax')) || 0;\n          el.style.transform = `translate(${dx * d}px, ${dy * d}px)`;\n        });\n      });\n    };\n    window.addEventListener('mousemove', this._mm);\n  }\n  componentWillUnmount() { clearInterval(this._t); clearInterval(this._st); if (this._mm) window.removeEventListener('mousemove', this._mm); }\n\n  enterApp = () => this.setState({ screen: 'app' });\n  goAuth = () => this.setState({ screen: 'auth' });\n  setSignin = () => this.setState({ authTab: 'signin' });\n  setSignup = () => this.setState({ authTab: 'signup' });\n  goView = (v) => this.setState({ view: v });\n  goLibrary = () => this.setState({ view: 'library' });\n  setRole = (r) => this.setState({ role: r });\n  canActFor(role) { return role === 'owner' || role === 'collaborator'; }\n  openConv = (id) => this.setState({ activeConvId: id, activeBranch: 'main', run: null });\n  selectBranch = (id) => this.setState({ activeBranch: id });\n  forkBranch = () => this.setState({ activeBranch: 'chunk-v2' });\n  onComposer = (e) => this.setState({ composer: e.target.value });\n\n  currentList() {\n    const { activeConvId, activeBranch } = this.state;\n    if (activeConvId === 'c1') return (activeBranch === 'chunk-v2' || activeBranch === 'chunk-reason') ? this.v2Messages : this.baseMessages;\n    return this.threads[activeConvId] || this.baseMessages;\n  }\n  nowTime() { const d = new Date(); return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }\n  scrollCanvas() { setTimeout(() => { const el = document.getElementById('hx-canvas'); if (el) el.scrollTop = el.scrollHeight; }, 30); }\n  scrollTrace() { setTimeout(() => { const el = document.getElementById('hx-trace'); if (el) el.scrollTop = el.scrollHeight; }, 30); }\n\n  sendMessage = () => {\n    const text = (this.state.composer || '').trim();\n    if (!text) return;\n    const list = this.currentList();\n    list.push({ id: 'u' + Date.now(), who: this.me.name, initial: this.me.initial, role: 'user', color: '#8C2B1E', time: this.nowTime(), body: text });\n    this.setState({ composer: '' });\n    this.scrollCanvas();\n    const reply = \"Got it — noted on the thread. I'll keep the heading-aware rule and flag any chunk over the 512 cap so we can review the boundary before indexing.\";\n    const msg = { id: 'a' + Date.now(), who: 'Helix', initial: '☉', role: 'assistant', color: '#8C2B1E', time: this.nowTime(), body: '', typing: true };\n    setTimeout(() => {\n      list.push(msg); this.forceUpdate(); this.scrollCanvas();\n      let i = 0; clearInterval(this._st);\n      this._st = setInterval(() => {\n        i += 2; msg.body = reply.slice(0, i);\n        if (i >= reply.length) { msg.body = reply; msg.typing = false; msg.tokens = '58 tokens · ☉ groq/llama-3.1-70b · 0.5s'; clearInterval(this._st); }\n        this.forceUpdate(); this.scrollCanvas();\n      }, 24);\n    }, 420);\n  };\n\n  startRun = () => {\n    if (!this.canActFor(this.state.role)) return;\n    const cur = this.state.run;\n    if (cur && (cur.status === 'running' || cur.status === 'paused')) return;\n    const run = { status: 'running', steps: [], depth: 0, idx: 0, energy: 1.0, tokens: 0, budget: 9000, alerted: false, stopReason: null };\n    this.setState({ run, steerOpen: false });\n    clearInterval(this._t);\n    this._t = setInterval(this.tick, 1500);\n    setTimeout(this.tick, 340);\n  };\n  tick = () => {\n    const run = this.state.run;\n    if (!run || run.status !== 'running') return;\n    if (run.tokens >= run.budget) return this.finish('killed', 'budget');\n    if (run.depth >= 7) return this.finish('killed', 'depth_guard');\n    if (run.energy < 0.12) return this.finish('done', 'converged');\n    const phases = ['reason', 'reflect', 'synthesize'];\n    const phase = phases[run.idx % 3];\n    const pool = phase === 'reason' ? this.NIGREDO : phase === 'reflect' ? this.ALBEDO : this.RUBEDO;\n    const cycle = Math.floor(run.idx / 3);\n    const text = pool[Math.min(cycle, pool.length - 1)];\n    const tok = 180 + Math.floor(Math.random() * 220);\n    const ms = 420 + Math.floor(Math.random() * 900);\n    run.steps.push({ idx: run.idx, kind: phase, text, depth: run.depth, tok, ms });\n    run.tokens += tok; run.idx += 1;\n    if (phase === 'synthesize') { run.depth += 1; run.energy = run.energy * 0.7; }\n    if (!run.alerted && run.tokens / run.budget >= 0.75) run.alerted = true;\n    this.setState({ run: { ...run } });\n    this.scrollTrace();\n  };\n  finish(status, reason) { const run = this.state.run; if (!run) return; clearInterval(this._t); run.status = status; run.stopReason = reason; this.setState({ run: { ...run }, steerOpen: false }); this.scrollTrace(); }\n  killRun = () => this.finish('killed', 'killed');\n  steerRun = () => {\n    const run = this.state.run; if (!run) return;\n    if (run.status === 'paused') { run.status = 'running'; this.setState({ run: { ...run }, steerOpen: false }); clearInterval(this._t); this._t = setInterval(this.tick, 1500); }\n    else { clearInterval(this._t); run.status = 'paused'; this.setState({ run: { ...run }, steerOpen: true }); }\n  };\n  onSteer = (e) => this.setState({ steerText: e.target.value });\n  applySteer = () => {\n    const run = this.state.run; if (!run) return;\n    if ((this.state.steerText || '').trim()) run.steps.push({ idx: run.idx, kind: 'steer', text: this.state.steerText.trim(), depth: run.depth, tok: 0, ms: 0 });\n    run.status = 'running';\n    this.setState({ run: { ...run }, steerOpen: false, steerText: '' });\n    clearInterval(this._t); this._t = setInterval(this.tick, 1500); this.scrollTrace();\n  };\n  dismissRun = () => { clearInterval(this._t); this.setState({ run: null, steerOpen: false }); };\n  onLibrarySearch = (e) => this.setState({ librarySearch: e.target.value });\n  insertPrompt = (p) => { p.used += 1; this.setState({ view: 'chat', composer: p.body }); };\n\n  navStyle(active) {\n    return `width:60px;height:58px;border:none;background:${active ? 'rgba(197,117,42,0.12)' : 'transparent'};color:${active ? 'var(--ember)' : 'var(--ash-2)'};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;transition:color .2s;`;\n  }\n  tabStyle(active) {\n    return `flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid ${active ? 'var(--oxblood)' : 'transparent'};cursor:pointer;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:${active ? 'var(--ink)' : 'var(--ink-faint)'};margin-bottom:-1px;`;\n  }\n  swStyle(active) {\n    return `width:34px;height:30px;border:none;cursor:pointer;font-size:15px;background:${active ? 'var(--ink)' : 'transparent'};color:${active ? 'var(--paper)' : 'var(--ink-3)'};`;\n  }\n  roleMeta(role) {\n    if (role === 'owner') return { sigil: '♔', rank: 'Owner', label: 'full access', color: '#8C2B1E' };\n    if (role === 'collaborator') return { sigil: '☿', rank: 'Collaborator', label: 'can edit', color: '#9A7A2C' };\n    return { sigil: '☽', rank: 'Viewer', label: 'read-only', color: '#796A4F' };\n  }\n  roman(n) { return ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'][n] || (n + 1); }\n\n  renderVals() {\n    const s = this.state;\n    const role = s.role;\n    const canAct = this.canActFor(role);\n    const isObserver = role === 'observer';\n    const run = s.run;\n    const rm = this.roleMeta(role);\n\n    const navDef = [\n      { id: 'chat', glyph: '🜍', label: 'Chats', title: 'Conversations' },\n      { id: 'library', glyph: '📖', label: 'Prompts', title: 'Saved prompts' },\n      { id: 'members', glyph: '☉', label: 'People', title: 'Members & roles' },\n    ];\n    const navItems = navDef.map(n => {\n      const active = s.view === n.id;\n      return { glyph: n.glyph, label: n.label, title: n.title, go: () => this.goView(n.id), style: this.navStyle(active),\n        markStyle: `position:absolute;left:0;top:9px;bottom:9px;width:3px;background:${active ? 'var(--ember)' : 'transparent'};` };\n    });\n\n    const online = this.member     const list = this.currentList();\n    const activeB = this.branches.find(b => b.id === s.activeBranch) || this.branches[0];\n\n    let firstUserDone = false;\n    const messages = list.map((m) => {\n      let dropCap = '';\n      let body = m.body;\n      if (!firstUserDone && m.role === 'user' && m.body && !m.typing) {\n        dropCap = m.body.trim().charAt(0);\n        body = m.body.trim().slice(1);\n        firstUserDone = true;\n      }\n      const isA = m.role === 'assistant';\n      return {\n        name: m.who, time: m.time, body, dropCap, typing: !!m.typing, tokens: m.tokens, forked: !!m.forked,\n        avatarGlyph: isA ? '☉' : m.initial,\n        nameColor: isA ? 'var(--oxblood)' : 'var(--ink)',\n        avatarStyle: isA\n          ? `width:34px;height:34px;border:1.5px solid var(--oxblood);border-radius:50%;color:var(--oxblood);display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--paper);`\n          : `width:34px;height:34px;border-radius:50%;background:${m.color};color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:15px;border:1px solid rgba(0,0,0,0.25);`,\n      };\n    });\n\n    const runIdle = !run, runActive = !!run;\n    const runLive = run && (run.status === 'running' || run.status === 'paused');\n    const runFinished = run && (run.status === 'done' || run.status === 'killed');\n    const energyPct = run ? Math.round(run.energy * 100) + '%' : '0%';\n    const budgetPct = run ? Math.min(100, Math.round((run.tokens / run.budget) * 100)) + '%' : '0%';\n    const bp = run ? run.tokens / run.budget : 0;\n    const budgetColor = bp >= 0.85 ? '#E07A5F' : bp >= 0.6 ? 'var(--ember)' : 'var(--verde)';\n\n    const stageMeta = (k) => {\n      if (k === 'reason') return { stage: 'Reason', sigil: '♄', color: 'var(--ash-2)', dot: '#6E6450', text: 'var(--ash)' };\n      if (k === 'reflect') return { stage: 'Reflect', sigil: '☽', color: '#C9D2DA', dot: '#9FB0BC', text: 'var(--ash)' };\n      if (k === 'synthesize') return { stage: 'Synthesize', sigil: '☉', color: 'var(--ember)', dot: 'var(--ember)', text: '#E8D9BC' };\n      return { stage: 'Your guidance', sigil: '☿', color: '#C9D2DA', dot: '#9FB0BC', text: '#C9D2DA' };\n    };\n    const steps = run ? run.steps.map(st => {\n      const sm = stageMeta(st.kind);\n      const meta = st.kind === 'steer' ? 'your note' : ('depth ' + st.depth + ' · ' + st.tok + ' tok · ' + st.ms + 'ms');\n      return { stage: sm.stage, sigil: sm.sigil, color: sm.color, text: st.text, meta, textColor: sm.text,\n        medallion: `width:24px;height:24px;border-radius:50%;border:1px solid ${sm.dot};color:${sm.color};display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--char-2);flex:0 0 auto;` };\n    }) : [];\n\n    let runStatusLabel = 'Idle', statusBg = 'rgba(255,255,255,0.06)', statusFg = 'var(--ash-2)';\n    if (run) {\n      if (run.status === 'running') { runStatusLabel = '◉ Reasoning'; statusBg = 'rgba(197,117,42,0.16)'; statusFg = 'var(--ember)'; }\n      else if (run.status === 'paused') { runStatusLabel = '❘❘ Paused'; statusBg = 'rgba(159,176,188,0.14)'; statusFg = '#C9D2DA'; }\n      else if (run.status === 'done') { runStatusLabel = '✓ Done'; statusBg = 'rgba(197,117,42,0.18)'; statusFg = 'var(--ember)'; }\n      else if (run.status === 'killed') { runStatusLabel = '■ Stopped'; statusBg = 'rgba(140,43,30,0.22)'; statusFg = '#E89A86'; }\n    }\n    const runStatusStyle = `font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;padding:4px 10px;background:${statusBg};color:${statusFg};letter-spacing:.04em;`;\n\n    let finishTitle = '', finishLabel = '', sealColor = 'var(--ember)', sealSigil = '☉';\n    if (runFinished) {\n      if (run.stopReason === 'converged') { finishTitle = 'Converged'; finishLabel = 'Ouroboros reached a stable answer and stopped on its own.'; sealColor = '#C0992F'; sealSigil = '☉'; }\n      else if (run.stopReason === 'budget') { finishTitle = 'Token budget reached'; finishLabel = 'Stopped cleanly at the token limit — a safe stop at a step boundary.'; sealColor = '#C5752A'; sealSigil = '◐'; }\n      else if (run.stopReason === 'depth_guard') { finishTitle = 'Depth limit reached'; finishLabel = 'Stopped at the maximum reasoning depth, before it could run away.'; sealColor = '#C5752A'; sealSigil = '♄'; }\n      else { finishTitle = 'Stopped'; finishLabel = 'You stopped the run at the next step boundary.'; sealColor = '#A8341F'; sealSigil = '■'; }\n    }\n    const sealStyle = 'animation:hx-stamp .7s cubic-bezier(.2,1.3,.4,1) both;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));';\n\n    const ouroSpin = run && run.status === 'running' ? 'animation:hx-spin 10s linear infinite;' : '';\n    const ouroStyle = `position:relative;width:84px;height:84px;flex:0 0 auto;border-radius:50%;${run && run.status === 'running' ? 'animation:hx-flicker 2.8s ease-in-out infinite;' : ''}`;\n\n    const observerDim = isObserver ? 'filter:sepia(0.18) saturate(0.82) brightness(0.97);' : '';\n\n    const memberRows = this.members.map(m => {\n      const meta = this.roleMeta(m.role);\n      return { initial: m.initial, color: m.color, name: m.name, email: m.email, status: m.status,\n        statusColor: m.status === 'present' ? 'var(--verde)' : 'var(--ink-faint)',\n        sigil: meta.sigil, rank: meta.rank, roleLabel: meta.label,\n        badgeStyle: `display:flex;align-items:center;gap:9px;padding:7px 13px;border:1px solid var(--rule);background:var(--paper-2);color:${meta.color};` };\n    });\n    const permRows = this.permActions.map((r, i) => ({\n      key: r.key, o: r.o ? '✦' : '·', c: r.c ? '✦' : '·', b: r.b ? '✦' : '·',\n      oColor: r.o ? 'var(--oxblood)' : 'var(--ink-faint)', cColor: r.c ? 'var(--gilt)' : 'var(--ink-faint)', bColor: r.b ? 'var(--verde)' : 'var(--ink-faint)',\n      rowStyle: `display:grid;grid-template-columns:1fr 96px 116px 96px;padding:12px 20px;align-items:cen BranchName: activeB.name, nodeCount: list.length + ' messages',\n      forkBranch: this.forkBranch, messages,\n      composer: s.composer, onComposer: this.onComposer, goLibrary: this.goLibrary,\n      startRun: this.startRun, sendMessage: this.sendMessage, providerLabel: '☉ groq · llama-3.1-70b',\n      runIdle, runActive, runLive, runFinished, runStatusStyle, runStatusLabel,\n      ouroStyle, ouroSpin, runDepth: run ? run.depth : 0,\n      energyPct, budgetPct, budgetColor, runTokens: run ? run.tokens : 0, runBudget: run ? run.budget : 9000,\n      budgetAlert: run && run.alerted && run.status === 'running',\n      steps, finishTitle, finishLabel, sealStyle, sealColor, sealSigil,\n      steerOpen: s.steerOpen, steerText: s.steerText, onSteer: this.onSteer, applySteer: this.applySteer,\n      steerRun: this.steerRun, killRun: this.killRun, dismissRun: this.dismissRun,\n      pauseLabel: run && run.status === 'paused' ? '▶ Resume' : '❘❘ Steer',\n      librarySearch: s.librarySearch, onLibrarySearch: this.onLibrarySearch,\n      promptCount: filtered.length + ' of ' + this.prompts.length, filteredPrompts,\n      memberRows, permRows, canEditPerms: role === 'owner',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
