# Helix — the default install. One container, SQLite, no other infrastructure.
#
#   docker compose up
#
# Then open http://localhost:8000 and register. That is the whole install.
#
# SQLite is a deliberate choice, not a limitation: a team workspace's data is
# small, and requiring a database server would turn a one-command install into
# an infrastructure project. Postgres is available for the hosted instance —
# see docker-compose.postgres.yml.

services:
  helix:
    build:
      # The build context is the repo root because the image needs *both*
      # frontend/ (stage 1) and backend/ (stage 2). Docker cannot copy from
      # outside its context, which is why the Dockerfile lives at the root.
      context: .
      dockerfile: Dockerfile
    image: helix:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # The database file lives on the named volume below, so it survives
      # `docker compose down` and image rebuilds.
      DATABASE_URL: sqlite+aiosqlite:////data/helix.db

      # Signs login tokens. The default is a placeholder that MUST be replaced
      # for any real deployment — generate one with:
      #     python -c "import secrets; print(secrets.token_urlsafe(32))"
      # Changing it later logs everyone out and invalidates saved provider
      # keys (their encryption is derived from it), so set it before inviting
      # anyone.
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}

      # stub = a fake model that echoes back, so the app is fully explorable
      # with no API key. Switch to groq and set GROQ_API_KEY for real replies,
      # or let each workspace bring its own key in the UI (TEAM -> Provider).
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # Optional: enables the agent's web_search tool. Greys out without it.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - helix-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

volumes:
  helix-data:
